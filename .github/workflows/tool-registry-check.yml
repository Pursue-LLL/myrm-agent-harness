name: Tool Registry Consistency

on:
  pull_request:
    paths:
      - 'src/myrm_agent_harness/**/*.py'
      - 'src/myrm_agent_harness/agent/tool_management/_TOOL_LAYERS*'
      - 'src/myrm_agent_harness/agent/tool_management/tool_layers.py'
      - 'src/myrm_agent_harness/agent/tool_management/*.md'
      - 'tests/architecture/test_tool_registry.py'
      - 'scripts/tool_registry_config.py'
      - 'scripts/tool_registry_engine.py'
      - 'scripts/validate_tool_registry.py'
      - '.pre-commit-config.yaml'
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/myrm_agent_harness/**/*.py'
      - 'src/myrm_agent_harness/agent/tool_management/tool_layers.py'
      - 'src/myrm_agent_harness/agent/tool_management/*.md'
      - 'tests/architecture/test_tool_registry.py'
      - 'scripts/tool_registry_*.py'
      - 'scripts/validate_tool_registry.py'

jobs:
  tool-registry-check:
    name: Tool Registry Consistency Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout OSS server monorepo for bootstrap parsing
        uses: actions/checkout@v4
        with:
          repository: Pursue-LLL/vortexai
          path: vortexai

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Run full tool-registry validation
        env:
          MYRM_SERVER_ROOT: ${{ github.workspace }}/vortexai/myrm-agent-server
        run: uv run python scripts/validate_tool_registry.py

      - name: Verify docs counts are in sync
        env:
          MYRM_SERVER_ROOT: ${{ github.workspace }}/vortexai/myrm-agent-server
        run: |
          uv run python scripts/validate_tool_registry.py --generate-docs
          if ! git diff --quiet src/myrm_agent_harness/agent/tool_management/; then
            echo "::error::Docs are out of sync. Run scripts/validate_tool_registry.py --generate-docs locally and commit the result."
            git diff src/myrm_agent_harness/agent/tool_management/
            exit 1
          fi
