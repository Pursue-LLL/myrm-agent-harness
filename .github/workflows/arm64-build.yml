name: ARM64 Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test-harness-arm64:
    name: Test Harness on ARM64
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Test harness unit tests on ARM64
        run: |
          docker run --platform linux/arm64 --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            python:3.13-slim bash -c "
              apt-get update && apt-get install -y curl && \
              curl -LsSf https://astral.sh/uv/install.sh | sh && \
              export PATH=\"\$HOME/.cargo/bin:\$PATH\" && \
              uv sync --all-extras && \
              uv run pytest tests/ -v --tb=short -x
            "

      - name: Check hnswlib availability on ARM64
        run: |
          docker run --platform linux/arm64 --rm python:3.13-slim bash -c "
            pip install hnswlib 2>&1 | tee hnswlib-install.log || echo 'hnswlib install failed (expected on ARM64)'
          "
        continue-on-error: true

  benchmark-arm64:
    name: Benchmark ARM64 Performance
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Run ARM64 benchmarks
        run: |
          docker run --platform linux/arm64 --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            python:3.13-slim bash -c "
              curl -LsSf https://astral.sh/uv/install.sh | sh && \
              export PATH=\"\$HOME/.cargo/bin:\$PATH\" && \
              uv sync --all-extras && \
              uv run pytest tests/performance/ --benchmark-only \
                --benchmark-json=arm64-bench.json || echo 'No benchmarks found'
            "

      - name: Upload ARM64 benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: arm64-benchmarks
          path: arm64-bench.json
          if-no-files-found: ignore
