name: Harness Security Scans

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  license-compliance:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install license scanner
        run: pip install pip-licenses

      - name: Scan Python licenses
        run: |
          pip install -e . 2>/dev/null || true
          pip-licenses --format=json --with-urls --output-file=licenses-harness.json || true
          pip-licenses --format=markdown --with-urls || true
        continue-on-error: true

      - name: Check for forbidden licenses
        run: |
          if grep -iE "GPL|AGPL" licenses-harness.json 2>/dev/null; then
            echo "::warning::Found copyleft license in harness dependencies"
          else
            echo "No copyleft licenses detected in harness dependencies"
          fi
        continue-on-error: true

      - name: Upload license report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: license-report-harness
          path: licenses-harness.json
          retention-days: 90

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-harness.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-harness
          path: sbom-harness.json
          retention-days: 90

  cve-scan:
    name: CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip-audit
        run: |
          pip-audit --desc --format json --output audit-harness.json || true
          pip-audit --desc
        continue-on-error: true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cve-audit-harness
          path: audit-harness.json
          retention-days: 30
