name: Harness Test Suite

on:
  pull_request:
    paths:
      - 'src/myrm_agent_harness/**/*.py'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
  push:
    branches:
      - main
    paths:
      - 'src/myrm_agent_harness/**/*.py'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit:
    name: Unit tests (memory-safe profile)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: >-
          uv run pytest -n 4 --dist=loadscope -q --tb=short tests/
          --ignore=tests/agent/skills/curator/test_engine.py

  browser-integration:
    name: Browser integration (serial Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies (browser extras)
        run: uv sync --dev --extra browser

      - name: Install Patchright Chromium
        run: uv run patchright install chromium

      - name: Run browser integration tests
        run: >-
          uv run pytest -n0 -q --tb=short tests/
          -m "integration or e2e" --timeout=600
          --ignore=tests/agent/skills/curator/test_engine.py
