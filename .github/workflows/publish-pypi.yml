name: Publish Harness to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-core:
    name: "Core wheel (${{ matrix.platform }})"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin-arm64
          - os: macos-13
            platform: darwin-x64
          - os: ubuntu-24.04
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-latest
            platform: win32-x64
          - os: windows-11-arm
            platform: win32-arm64

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.13
      - run: uv sync --group dev --group build
      - run: .venv/bin/python scripts/build_core.py --platform ${{ matrix.platform }} --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: core-wheel-${{ matrix.platform }}
          path: build/core/wheels/${{ matrix.platform }}/*.whl
          if-no-files-found: error

  build-release:
    name: Release wheel
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.13
      - run: uv sync --group dev --group build
      - run: .venv/bin/python scripts/build_release_wheel.py
      - uses: actions/upload-artifact@v4
        with:
          name: release-wheel
          path: dist/myrm_agent_harness-*.whl
          if-no-files-found: error

  publish-pypi:
    name: Upload all wheels to PyPI
    needs: [build-core, build-release]
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 30

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: wheels-in
          pattern: "*"
          merge-multiple: true

      - name: Collect wheels
        run: |
          mkdir -p wheels-out
          find wheels-in -name '*.whl' -exec cp {} wheels-out/ \;
          ls -la wheels-out/
          count="$(find wheels-out -name '*.whl' | wc -l | tr -d ' ')"
          if [[ "${count}" -lt 2 ]]; then
            echo "Expected release + core wheels, found ${count}" >&2
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheels-out
          skip-existing: true
