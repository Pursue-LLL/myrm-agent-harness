name: Publish Harness to PyPI

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform key (e.g. darwin-arm64). Empty = full matrix + release wheel."
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-matrix:
    name: Prepare core wheel matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      include: ${{ steps.set-matrix.outputs.include }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        env:
          REQUESTED_PLATFORM: ${{ inputs.platform }}
        run: |
          include=$(jq -c '.' .github/core-platform-matrix.json)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$REQUESTED_PLATFORM" ]; then
            filtered=$(echo "$include" | jq -c --arg p "$REQUESTED_PLATFORM" '[.[] | select(.platform == $p)]')
            if [ "$(echo "$filtered" | jq 'length')" -eq 0 ]; then
              echo "::error::Unknown platform: $REQUESTED_PLATFORM" >&2
              exit 1
            fi
            echo "include=$filtered" >> "$GITHUB_OUTPUT"
          else
            echo "include=$include" >> "$GITHUB_OUTPUT"
          fi

  build-core:
    name: "Core wheel (${{ matrix.platform }})"
    needs: prepare-matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare-matrix.outputs.include) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install build dependencies
        run: uv sync --group build --no-install-project

      - name: Build platform wheel
        run: uv run python scripts/build_core.py --platform ${{ matrix.platform }} --wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-wheel-${{ matrix.platform }}
          path: build/core/wheels/${{ matrix.platform }}/*.whl
          if-no-files-found: error

  release-wheel:
    name: Release wheel (tag)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install build dependencies
        run: uv sync --group build --no-install-project

      - name: Build stripped release wheel
        run: uv run python scripts/build_release_wheel.py

      - name: Upload release wheel
        uses: actions/upload-artifact@v4
        with:
          name: release-wheel
          path: dist/myrm_agent_harness-*.whl
          if-no-files-found: error

  publish-pypi:
    name: Upload wheels to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-core
      - release-wheel
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: pypi
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download core wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: core-wheel-*
          merge-multiple: true
          path: pypi-upload

      - name: Download release wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: release-wheel
          path: pypi-upload

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install build dependencies
        run: uv sync --group build --no-install-project

      - name: Validate wheels before upload
        run: uv run python scripts/validate_pypi_wheels.py pypi-upload

      - name: Stage release vs core upload dirs
        run: |
          mkdir -p pypi-upload-release pypi-upload-core
          shopt -s nullglob
          for wheel in pypi-upload/*.whl; do
            case "$(basename "$wheel")" in
              myrm_agent_harness-*) mv "$wheel" pypi-upload-release/ ;;
              myrm_agent_harness_core_*) mv "$wheel" pypi-upload-core/ ;;
              *) echo "::error::Unexpected wheel: $wheel" >&2; exit 1 ;;
            esac
          done
          echo "release wheels: $(ls -1 pypi-upload-release | wc -l | tr -d ' ')"
          echo "core wheels: $(ls -1 pypi-upload-core | wc -l | tr -d ' ')"

      - name: Publish wheels (API token)
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${TWINE_PASSWORD}" ]; then
            echo "::error::Set repository secret PYPI_API_TOKEN for harness PyPI uploads." >&2
            exit 1
          fi
          shopt -s nullglob
          wheels=(pypi-upload-release/*.whl pypi-upload-core/*.whl)
          if [ "${#wheels[@]}" -eq 0 ]; then
            echo "::error::No wheels staged for upload." >&2
            exit 1
          fi
          uv tool run twine upload --non-interactive --skip-existing "${wheels[@]}"

      - name: Verify all packages indexed on PyPI
        run: uv run python scripts/verify_pypi_publish.py
