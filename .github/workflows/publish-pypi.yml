name: Publish Harness to PyPI

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform key (e.g. darwin-arm64). Empty = full matrix + release wheel."
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-core:
    name: "Core wheel (${{ matrix.platform }})"
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == '' || inputs.platform == matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin-arm64
          - os: macos-13
            platform: darwin-x64
          - os: ubuntu-24.04
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-latest
            platform: win32-x64
          - os: windows-11-arm
            platform: win32-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install build dependencies
        run: uv sync --group dev --group build

      - name: Build platform wheel
        run: .venv/bin/python scripts/build_core.py --platform ${{ matrix.platform }} --wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-wheel-${{ matrix.platform }}
          path: build/core/wheels/${{ matrix.platform }}/*.whl
          if-no-files-found: error

  release-wheel:
    name: Release wheel (tag)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install build dependencies
        run: uv sync --group dev --group build

      - name: Build stripped release wheel
        run: .venv/bin/python scripts/build_release_wheel.py

      - name: Upload release wheel
        uses: actions/upload-artifact@v4
        with:
          name: release-wheel
          path: dist/myrm_agent_harness-*.whl
          if-no-files-found: error

  publish-pypi:
    name: Upload wheels to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-core
      - release-wheel
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download core wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: core-wheel-*
          merge-multiple: true
          path: pypi-upload

      - name: Download release wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: release-wheel
          path: pypi-upload

      - name: List wheels to upload
        run: ls -la pypi-upload/

      - name: Fail if no wheels collected
        run: |
          count="$(find pypi-upload -name '*.whl' 2>/dev/null | wc -l | tr -d ' ')"
          if [[ "${count}" -lt 2 ]]; then
            echo "Expected release wheel + core wheels; found ${count}." >&2
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pypi-upload
          skip-existing: true
