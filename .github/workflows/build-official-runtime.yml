name: Build Official Runtime Image

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: myrmagent/myrm-runtime

jobs:
  build-runtime:
    name: Official runtime Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Checkout OSS server monorepo
        uses: actions/checkout@v4
        with:
          repository: Pursue-LLL/vortexai
          path: vortexai

      - name: Prepare monorepo build context
        run: |
          mkdir -p build-context/myrm-agent-harness build-context/myrm-agent-server
          rsync -a \
            --exclude build-context \
            --exclude vortexai \
            --exclude .git \
            ./ build-context/myrm-agent-harness/
          cp -a vortexai/myrm-agent-server/. build-context/myrm-agent-server/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push official runtime image
        uses: docker/build-push-action@v6
        with:
          context: build-context
          file: build-context/myrm-agent-server/docker/Dockerfile.official
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify harness distribution in image
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          docker build -f build-context/myrm-agent-server/docker/Dockerfile.official \
            -t myrm-runtime:ci build-context
          docker run --rm myrm-runtime:ci verify-harness-distribution --matplotlib-cjk
