name: Build Compiled Core Wheels

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform key (e.g. darwin-arm64). Empty = matrix build."
        required: false
        default: ""

jobs:
  prepare-matrix:
    name: Prepare core wheel matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      include: ${{ steps.set-matrix.outputs.include }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        env:
          REQUESTED_PLATFORM: ${{ inputs.platform }}
        run: |
          include=$(jq -c '.' .github/core-platform-matrix.json)
          if [ -n "$REQUESTED_PLATFORM" ]; then
            filtered=$(echo "$include" | jq -c --arg p "$REQUESTED_PLATFORM" '[.[] | select(.platform == $p)]')
            if [ "$(echo "$filtered" | jq 'length')" -eq 0 ]; then
              echo "::error::Unknown platform: $REQUESTED_PLATFORM" >&2
              exit 1
            fi
            echo "include=$filtered" >> "$GITHUB_OUTPUT"
          else
            echo "include=$include" >> "$GITHUB_OUTPUT"
          fi

  build-core:
    name: "Core wheel (${{ matrix.platform }})"
    needs: prepare-matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare-matrix.outputs.include) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install build dependencies
        run: uv sync --group dev --group build

      - name: Build platform wheel
        run: .venv/bin/python scripts/build_core.py --platform ${{ matrix.platform }} --wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-wheel-${{ matrix.platform }}
          path: build/core/wheels/${{ matrix.platform }}/*.whl
          if-no-files-found: error
