name: Build Compiled Core Wheels

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform key (e.g. darwin-arm64). Empty = matrix build."
        required: false
        default: ""
  push:
    tags:
      - "v*"

jobs:
  build-core:
    name: "Core wheel (${{ matrix.platform }})"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin-arm64
          - os: macos-13
            platform: darwin-x64
          - os: ubuntu-24.04
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-latest
            platform: win32-x64
          - os: windows-11-arm
            platform: win32-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install build dependencies
        run: uv sync --group dev --group build

      - name: Build platform wheel
        run: .venv/bin/python scripts/build_core.py --platform ${{ matrix.platform }} --wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-wheel-${{ matrix.platform }}
          path: build/core/wheels/${{ matrix.platform }}/*.whl
          if-no-files-found: error

  release-wheel:
    name: Release wheel (tag)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install build dependencies
        run: uv sync --group dev --group build

      - name: Build stripped release wheel
        run: .venv/bin/python scripts/build_release_wheel.py

      - name: Upload release wheel
        uses: actions/upload-artifact@v4
        with:
          name: release-wheel
          path: dist/myrm_agent_harness-*.whl
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release wheels
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-core
      - release-wheel
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download core wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: core-wheel-*
          merge-multiple: true
          path: release-assets

      - name: Download release wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: release-wheel
          path: release-assets

      - name: List release assets
        run: ls -la release-assets/

      - name: Generate release manifest
        run: python3 scripts/generate_release_manifest.py release-assets --tag "${GITHUB_REF_NAME}"

      - name: Publish public wheels release
        env:
          GH_TOKEN: ${{ secrets.MYRM_HARNESS_WHEELS_PUBLISH_TOKEN }}
          WHEELS_REPO: Pursue-LLL/myrm-agent-harness-wheels
          IS_PRERELEASE: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "MYRM_HARNESS_WHEELS_PUBLISH_TOKEN is not configured; cannot publish public wheels." >&2
            exit 1
          fi
          if gh release view "${TAG}" --repo "${WHEELS_REPO}" >/dev/null 2>&1; then
            gh release delete "${TAG}" --repo "${WHEELS_REPO}" --yes --cleanup-tag=false
          fi
          release_args=(
            release create "${TAG}" release-assets/*
            --repo "${WHEELS_REPO}"
            --title "${TAG}"
            --notes "Public harness wheels for ${TAG}. Source remains private in Pursue-LLL/myrm-agent-harness."
          )
          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            release_args+=(--prerelease)
          fi
          gh "${release_args[@]}"

