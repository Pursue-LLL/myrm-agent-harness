# Core IP modules compiled to native extensions in release wheels.
#
# Paths are relative to src/myrm_agent_harness/ (without .py suffix).
# Development installs keep these as readable .py source.
# Release CI replaces leaf modules with Nuitka-compiled .so via build_core.py.
# Package __init__.py files are kept as readable re-export stubs (not compiled).

directories:
  - agent/skills/evolution
  - agent/context_management/pipeline
  - toolkits/memory/strategies
  - toolkits/memory/cognitive
  - toolkits/memory/proactive

modules: []
